name: Sync exp/jacob to demo/stable

on:
  push:
    branches:
      - exp/jacob
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push to demo/stable
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge exp/jacob into demo/stable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout demo/stable
          git merge origin/exp/jacob -m "chore: sync exp/jacob into demo/stable"
          git push origin demo/stable

# Relay webhook - no JWT required (Relay can't send Supabase auth)
[functions.relay-location-callback]
enabled = true
verify_jwt = false

[functions.trike-server]
enabled = true
verify_jwt = true
import_map = "./functions/trike-server/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/trike-server/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/trike-server/*.html" ]
